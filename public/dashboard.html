<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JustFit Admin</title>
  <style>
    :root {
      --bg: #020617;
      --card: rgba(255,255,255,0.04);
      --border: rgba(255,255,255,0.1);
      --text: #f8fafc;
      --muted: #94a3b8;
      --accent: #10b981;
      --accent-dim: rgba(16,185,129,0.15);
      --accent-border: rgba(16,185,129,0.35);
      --danger: #f87171;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      min-height: 100vh;
    }

    /* ── Login ─────────────────────────────────────── */
    #login-page {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }
    .login-card {
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 40px 36px;
      width: 100%;
      max-width: 420px;
    }
    .login-icon-wrap {
      width: 60px;
      height: 60px;
      background: var(--accent-dim);
      border: 1px solid var(--accent-border);
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 20px;
    }
    .login-title { font-size: 26px; font-weight: 900; margin-bottom: 4px; }
    .login-sub { font-size: 14px; color: var(--muted); margin-bottom: 28px; }
    .login-divider {
      border: none;
      border-top: 1px solid var(--border);
      margin-bottom: 28px;
    }
    .field-label {
      display: block;
      font-size: 12px;
      font-weight: 800;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .08em;
      margin-bottom: 8px;
    }
    .field-input {
      width: 100%;
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border);
      border-radius: 14px;
      color: var(--text);
      padding: 14px 16px;
      font-size: 15px;
      margin-bottom: 20px;
      outline: none;
      transition: border-color .15s;
    }
    .field-input:focus { border-color: var(--accent); }
    .login-btn {
      width: 100%;
      background: var(--accent);
      color: #020617;
      border: none;
      border-radius: 14px;
      padding: 15px;
      font-size: 15px;
      font-weight: 900;
      cursor: pointer;
      transition: opacity .15s;
    }
    .login-btn:hover:not(:disabled) { opacity: .88; }
    .login-btn:disabled { opacity: .5; cursor: default; }
    .login-error {
      font-size: 13px;
      color: var(--danger);
      margin-top: 14px;
      min-height: 18px;
      text-align: center;
    }

    /* ── Dashboard ─────────────────────────────────── */
    #dashboard-page { display: none; padding: 24px; }
    .wrap { max-width: 1200px; margin: 0 auto; }
    .top-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
    }
    .dash-title { font-size: 28px; font-weight: 900; }
    .sign-out-btn {
      background: rgba(255,255,255,0.06);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--muted);
      padding: 8px 16px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      transition: color .15s;
    }
    .sign-out-btn:hover { color: var(--text); }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 16px;
      margin-bottom: 16px;
    }
    .kpi-label { color: var(--muted); font-size: 12px; text-transform: uppercase; letter-spacing: .08em; font-weight: 800; }
    .kpi-value { font-size: 42px; font-weight: 900; margin-top: 8px; }
    .status { color: var(--muted); font-size: 13px; min-height: 18px; margin-bottom: 16px; }
    table { width: 100%; border-collapse: collapse; }
    th {
      text-align: left;
      color: var(--muted);
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: .06em;
      padding: 10px;
    }
  </style>
</head>
<body>

  <!-- ── Login ──────────────────────────────────────── -->
  <div id="login-page">
    <div class="login-card">
      <div class="login-icon-wrap">
        <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#10b981" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="11" width="18" height="11" rx="2"/>
          <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
        </svg>
      </div>
      <div class="login-title">Secure access</div>
      <div class="login-sub">Sign in to continue</div>
      <hr class="login-divider" />
      <label class="field-label" for="pwd-input">Password</label>
      <input id="pwd-input" class="field-input" type="password" placeholder="&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;" autocomplete="current-password" />
      <button id="login-btn" class="login-btn" type="button">Sign in</button>
      <div id="login-error" class="login-error"></div>
    </div>
  </div>

  <!-- ── Dashboard ─────────────────────────────────── -->
  <div id="dashboard-page">
    <div class="wrap">
      <div class="top-bar">
        <div class="dash-title">Admin Dashboard</div>
        <button id="sign-out-btn" class="sign-out-btn" type="button">Sign out</button>
      </div>
      <div id="status" class="status"></div>
      <div class="card">
        <div class="kpi-label">Registered users</div>
        <div id="users-count" class="kpi-value">-</div>
      </div>
      <div class="card">
        <div class="kpi-label" style="margin-bottom:8px;">Errors / Events (newest first)</div>
        <table>
          <thead>
            <tr>
              <th style="width:190px;">Timestamp</th>
              <th style="width:160px;">Type</th>
              <th style="width:240px;">User</th>
              <th>Detail</th>
            </tr>
          </thead>
          <tbody id="errors-body"></tbody>
        </table>
      </div>
    </div>
  </div>

  <script src="/dashboard.js?v=2"></script>
</body>
</html>
