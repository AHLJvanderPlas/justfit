<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JustFit Admin Dashboard</title>
  <style>
    :root {
      --bg: #020617;
      --card: rgba(255,255,255,0.04);
      --border: rgba(255,255,255,0.1);
      --text: #f8fafc;
      --muted: #94a3b8;
      --accent: #10b981;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      padding: 24px;
    }
    .wrap { max-width: 1200px; margin: 0 auto; }
    .title { font-size: 32px; font-weight: 900; margin: 0 0 16px; }
    .row { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 18px; }
    input {
      flex: 1;
      min-width: 240px;
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border);
      border-radius: 12px;
      color: var(--text);
      padding: 10px 12px;
      font-size: 14px;
    }
    button {
      border: 1px solid rgba(16,185,129,0.45);
      border-radius: 12px;
      background: rgba(16,185,129,0.16);
      color: var(--accent);
      padding: 10px 16px;
      font-weight: 800;
      cursor: pointer;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 16px;
      margin-bottom: 16px;
    }
    .kpi-label { color: var(--muted); font-size: 12px; text-transform: uppercase; letter-spacing: .08em; font-weight: 800; }
    .kpi-value { font-size: 42px; font-weight: 900; margin-top: 8px; }
    .status { color: var(--muted); font-size: 13px; min-height: 18px; }
    table { width: 100%; border-collapse: collapse; }
    th {
      text-align: left;
      color: var(--muted);
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: .06em;
      padding: 10px;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1 class="title">Admin Dashboard</h1>
    <div class="row">
      <input id="admin-key" type="password" placeholder="Enter dashboard password" autocomplete="off" />
      <button id="load-btn" type="button">Load</button>
    </div>
    <div id="status" class="status"></div>

    <div class="card">
      <div class="kpi-label">Registered users</div>
      <div id="users-count" class="kpi-value">-</div>
    </div>

    <div class="card">
      <div class="kpi-label" style="margin-bottom:8px;">Errors / Events (newest first)</div>
      <table>
        <thead>
          <tr>
            <th style="width:190px;">Timestamp</th>
            <th style="width:160px;">Type</th>
            <th style="width:240px;">User</th>
            <th>Detail</th>
          </tr>
        </thead>
        <tbody id="errors-body"></tbody>
      </table>
    </div>
  </div>
  <script src="/dashboard.js"></script>
</body>
</html>
