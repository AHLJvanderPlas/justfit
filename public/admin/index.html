<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JustFit Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;900&family=Inter+Tight:wght@400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:           #020617;
      --bg2:          #0a1020;
      --card:         rgba(255,255,255,0.04);
      --card2:        rgba(255,255,255,0.07);
      --border:       rgba(255,255,255,0.09);
      --border2:      rgba(255,255,255,0.15);
      --text:         #f8fafc;
      --muted:        #94a3b8;
      --subtle:       #475569;
      --accent:       #10b981;
      --accent-dim:   rgba(16,185,129,0.12);
      --accent-bdr:   rgba(16,185,129,0.35);
      --danger:       #f87171;
      --danger-dim:   rgba(248,113,113,0.12);
      --warn:         #fbbf24;
      --warn-dim:     rgba(251,191,36,0.12);
      --blue:         #60a5fa;
      --blue-dim:     rgba(96,165,250,0.12);
      --sidebar-w:    220px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter Tight', -apple-system, sans-serif;
      font-size: 14px;
      line-height: 1.5;
      min-height: 100vh;
    }
    h1, h2, h3, .display {
      font-family: 'Barlow Condensed', sans-serif;
      letter-spacing: 0.01em;
    }
    code, .mono { font-family: 'JetBrains Mono', monospace; font-size: 0.88em; }

    /* ── Login ───────────────────────────────────────── */
    #login-page {
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; padding: 24px;
    }
    .login-card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 24px; padding: 40px 36px;
      width: 100%; max-width: 420px;
    }
    .login-logo {
      width: 52px; height: 52px;
      background: var(--accent-dim); border: 1px solid var(--accent-bdr);
      border-radius: 14px; display: flex; align-items: center; justify-content: center;
      margin-bottom: 20px;
    }
    .login-title { font-size: 30px; font-weight: 900; margin-bottom: 4px; }
    .login-sub   { font-size: 13px; color: var(--muted); margin-bottom: 28px; }
    .login-divider { border: none; border-top: 1px solid var(--border); margin-bottom: 28px; }
    .field-label { display: block; font-size: 11px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 7px; }
    .field-input {
      width: 100%; background: var(--card2); border: 1px solid var(--border);
      border-radius: 12px; color: var(--text); padding: 12px 14px;
      font-size: 14px; font-family: inherit; margin-bottom: 16px;
      outline: none; transition: border-color .15s;
    }
    .field-input:focus { border-color: var(--accent); }
    .btn-primary {
      width: 100%; background: var(--accent); color: #020617; border: none;
      border-radius: 12px; padding: 14px; font-size: 14px; font-weight: 700;
      cursor: pointer; transition: opacity .15s; font-family: inherit;
    }
    .btn-primary:hover:not(:disabled) { opacity: .88; }
    .btn-primary:disabled { opacity: .45; cursor: default; }
    .login-error { font-size: 13px; color: var(--danger); margin-top: 14px; min-height: 18px; text-align: center; }

    /* ── App shell ───────────────────────────────────── */
    #admin-shell { display: none; height: 100vh; overflow: hidden; }
    .shell-layout { display: flex; height: 100vh; }

    /* ── Sidebar ─────────────────────────────────────── */
    #sidebar {
      width: var(--sidebar-w); flex-shrink: 0;
      background: var(--bg2); border-right: 1px solid var(--border);
      display: flex; flex-direction: column; padding: 20px 0;
      overflow-y: auto;
    }
    .sidebar-logo {
      padding: 0 18px 20px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 12px;
    }
    .sidebar-logo-mark {
      display: flex; align-items: center; gap: 10px;
    }
    .logo-tile {
      width: 32px; height: 32px; background: var(--accent);
      border-radius: 8px; display: flex; align-items: center; justify-content: center;
    }
    .logo-text { font-family: 'Barlow Condensed', sans-serif; font-size: 18px; font-weight: 900; }
    .logo-sub  { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: .1em; margin-top: 1px; }

    .nav-item {
      display: flex; align-items: center; gap: 10px;
      padding: 9px 18px; cursor: pointer;
      font-size: 13px; font-weight: 600; color: var(--muted);
      border: none; background: none; width: 100%; text-align: left;
      border-radius: 0; transition: color .15s, background .15s;
      font-family: inherit;
    }
    .nav-item:hover { color: var(--text); background: var(--card); }
    .nav-item.active { color: var(--accent); background: var(--accent-dim); }
    .nav-item svg { width: 16px; height: 16px; flex-shrink: 0; }

    .nav-badge {
      margin-left: auto; background: var(--danger); color: #fff;
      font-size: 10px; font-weight: 700; border-radius: 10px;
      padding: 1px 6px; min-width: 18px; text-align: center;
    }

    .sidebar-bottom {
      margin-top: auto; padding: 16px 18px; border-top: 1px solid var(--border);
    }
    .admin-info { font-size: 12px; color: var(--muted); margin-bottom: 10px; word-break: break-all; }
    .btn-ghost {
      background: none; border: 1px solid var(--border); border-radius: 8px;
      color: var(--muted); padding: 7px 12px; font-size: 12px; font-weight: 600;
      cursor: pointer; width: 100%; font-family: inherit; transition: color .15s;
    }
    .btn-ghost:hover { color: var(--text); }

    /* ── Main content ────────────────────────────────── */
    #content {
      flex: 1; overflow-y: auto; padding: 28px;
    }
    .page-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; }
    .page-title  { font-size: 32px; font-weight: 900; }
    .page-sub    { font-size: 13px; color: var(--muted); margin-top: 2px; }

    /* ── KPI cards ───────────────────────────────────── */
    .kpi-grid { display: flex; flex-wrap: wrap; gap: 12px; margin-bottom: 24px; }
    .kpi-card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 16px; padding: 16px 20px; min-width: 150px; flex: 1;
    }
    .kpi-label { font-size: 10px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; }
    .kpi-value { font-family: 'Barlow Condensed', sans-serif; font-size: 38px; font-weight: 900; margin-top: 4px; line-height: 1; }
    .kpi-sub   { font-size: 11px; color: var(--muted); margin-top: 3px; }
    .kpi-accent { color: var(--accent); }
    .kpi-warn   { color: var(--warn); }
    .kpi-danger { color: var(--danger); }

    /* ── Cards / sections ────────────────────────────── */
    .card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 16px; padding: 18px; margin-bottom: 16px;
    }
    .card-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 14px; gap: 12px; flex-wrap: wrap;
    }
    .card-title {
      font-size: 11px; font-weight: 700; color: var(--muted);
      text-transform: uppercase; letter-spacing: .08em;
    }
    .card-actions { display: flex; gap: 8px; align-items: center; }

    /* ── Tables ──────────────────────────────────────── */
    .tbl-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th {
      text-align: left; color: var(--muted); font-size: 10px; font-weight: 700;
      text-transform: uppercase; letter-spacing: .06em; padding: 8px 10px;
      white-space: nowrap; border-bottom: 1px solid var(--border);
    }
    th.sortable { cursor: pointer; }
    th.sortable:hover { color: var(--text); }
    th.sort-asc::after  { content: ' ↑'; }
    th.sort-desc::after { content: ' ↓'; }
    td {
      padding: 10px; border-bottom: 1px solid var(--border);
      vertical-align: middle; max-width: 260px; word-break: break-word;
    }
    tr:last-child td { border-bottom: none; }
    tr.clickable { cursor: pointer; }
    tr.clickable:hover td { background: var(--card2); }
    td.muted   { color: var(--muted); font-size: 12px; }
    td.mono    { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--muted); }
    td.nowrap  { white-space: nowrap; }
    td.actions { white-space: nowrap; }

    /* ── Badges ──────────────────────────────────────── */
    .badge {
      display: inline-flex; align-items: center; padding: 2px 8px;
      border-radius: 6px; font-size: 10px; font-weight: 700;
      text-transform: uppercase; letter-spacing: .05em; white-space: nowrap;
    }
    .badge-active   { background: rgba(16,185,129,.15); color: #10b981; }
    .badge-pending  { background: rgba(251,191,36,.15);  color: #fbbf24; }
    .badge-suspend  { background: rgba(248,113,113,.15); color: #f87171; }
    .badge-draft    { background: rgba(148,163,184,.12); color: #94a3b8; }
    .badge-sent     { background: rgba(96,165,250,.15);  color: #60a5fa; }
    .badge-paid     { background: rgba(16,185,129,.15);  color: #10b981; }
    .badge-overdue  { background: rgba(248,113,113,.15); color: #f87171; }
    .badge-void     { background: rgba(100,116,139,.12); color: #64748b; }
    .badge-starter  { background: rgba(148,163,184,.12); color: #94a3b8; }
    .badge-pro      { background: rgba(96,165,250,.15);  color: #60a5fa; }
    .badge-studio   { background: rgba(192,132,252,.15); color: #c084fc; }
    .badge-deleted  { background: rgba(100,116,139,.12); color: #64748b; }

    /* ── Filter bar ──────────────────────────────────── */
    .filter-bar { display: flex; gap: 8px; margin-bottom: 14px; flex-wrap: wrap; align-items: center; }
    .filter-input {
      background: var(--card2); border: 1px solid var(--border);
      border-radius: 9px; color: var(--text); padding: 7px 12px;
      font-size: 13px; font-family: inherit; outline: none;
      transition: border-color .15s; min-width: 200px;
    }
    .filter-input:focus { border-color: var(--accent); }
    .filter-input::placeholder { color: var(--muted); }
    .filter-select {
      background: var(--card2); border: 1px solid var(--border);
      border-radius: 9px; color: var(--text); padding: 7px 10px;
      font-size: 13px; font-family: inherit; outline: none; cursor: pointer;
    }

    /* ── Buttons ─────────────────────────────────────── */
    .btn {
      border: none; border-radius: 8px; padding: 7px 14px;
      font-size: 12px; font-weight: 700; cursor: pointer;
      font-family: inherit; transition: opacity .15s; white-space: nowrap;
    }
    .btn:disabled { opacity: .4; cursor: default; }
    .btn-sm { padding: 4px 10px; font-size: 11px; border-radius: 6px; }
    .btn-green  { background: var(--accent); color: #020617; }
    .btn-green:hover:not(:disabled) { opacity: .85; }
    .btn-red    { background: var(--danger-dim); color: var(--danger); border: 1px solid rgba(248,113,113,.3); }
    .btn-red:hover:not(:disabled) { background: rgba(248,113,113,.2); }
    .btn-blue   { background: var(--blue-dim); color: var(--blue); border: 1px solid rgba(96,165,250,.3); }
    .btn-blue:hover:not(:disabled) { background: rgba(96,165,250,.2); }
    .btn-warn   { background: var(--warn-dim); color: var(--warn); border: 1px solid rgba(251,191,36,.3); }
    .btn-neutral { background: var(--card2); color: var(--muted); border: 1px solid var(--border); }
    .btn-neutral:hover:not(:disabled) { color: var(--text); }

    /* ── Pagination ──────────────────────────────────── */
    .pagination { display: flex; align-items: center; justify-content: space-between; padding-top: 12px; }
    .pagination-info { font-size: 12px; color: var(--muted); }

    /* ── Modal ───────────────────────────────────────── */
    #modal-overlay {
      display: none; position: fixed; inset: 0; z-index: 100;
      background: rgba(2,6,23,0.85); backdrop-filter: blur(4px);
      align-items: center; justify-content: center; padding: 24px;
    }
    #modal-overlay.open { display: flex; }
    .modal {
      background: #0d1627; border: 1px solid var(--border2);
      border-radius: 20px; width: 100%; max-width: 700px;
      max-height: 90vh; overflow-y: auto; padding: 28px;
      position: relative;
    }
    .modal-close {
      position: absolute; top: 16px; right: 16px;
      background: var(--card2); border: 1px solid var(--border);
      border-radius: 8px; color: var(--muted);
      width: 30px; height: 30px; display: flex; align-items: center; justify-content: center;
      cursor: pointer; font-size: 16px; line-height: 1;
    }
    .modal-close:hover { color: var(--text); }
    .modal-title { font-family: 'Barlow Condensed', sans-serif; font-size: 24px; font-weight: 900; margin-bottom: 4px; }
    .modal-sub   { font-size: 12px; color: var(--muted); margin-bottom: 20px; }
    .modal-divider { border: none; border-top: 1px solid var(--border); margin: 16px 0; }
    .modal-section { margin-bottom: 18px; }
    .modal-label { font-size: 11px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 5px; }
    .modal-value { font-size: 14px; }
    .modal-row { display: flex; gap: 20px; margin-bottom: 14px; flex-wrap: wrap; }
    .modal-col { flex: 1; min-width: 120px; }
    .modal-actions { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 20px; }

    /* ── Form ────────────────────────────────────────── */
    .form-group { margin-bottom: 14px; }
    .form-label {
      display: block; font-size: 11px; font-weight: 700; color: var(--muted);
      text-transform: uppercase; letter-spacing: .08em; margin-bottom: 6px;
    }
    .form-input, .form-select, .form-textarea {
      width: 100%; background: var(--card2); border: 1px solid var(--border);
      border-radius: 10px; color: var(--text); padding: 10px 12px;
      font-size: 13px; font-family: inherit; outline: none;
      transition: border-color .15s;
    }
    .form-input:focus, .form-select:focus, .form-textarea:focus { border-color: var(--accent); }
    .form-textarea { resize: vertical; min-height: 90px; }
    .form-row { display: flex; gap: 12px; }
    .form-row .form-group { flex: 1; }
    .form-error { font-size: 12px; color: var(--danger); margin-top: 6px; }
    .form-hint  { font-size: 11px; color: var(--muted); margin-top: 4px; }

    /* ── Tag chips ───────────────────────────────────── */
    .chip-list { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 6px; }
    .chip {
      background: var(--card2); border: 1px solid var(--border);
      border-radius: 6px; padding: 3px 8px; font-size: 11px;
      font-family: 'JetBrains Mono', monospace; cursor: default;
      display: flex; align-items: center; gap: 5px;
    }
    .chip-rm {
      background: none; border: none; color: var(--muted);
      cursor: pointer; font-size: 12px; line-height: 1; padding: 0;
    }
    .chip-rm:hover { color: var(--danger); }

    /* ── Table footer ────────────────────────────────── */
    .tbl-footer { display: flex; align-items: center; justify-content: space-between; padding-top: 10px; }
    .tbl-count  { font-size: 12px; color: var(--muted); }

    /* ── Loading ─────────────────────────────────────── */
    .loading { color: var(--muted); padding: 40px; text-align: center; }
    .empty   { color: var(--muted); padding: 24px; text-align: center; font-size: 13px; }

    /* ── Inline confirm ──────────────────────────────── */
    .confirm-wrap { display: none; align-items: center; gap: 8px; }
    .confirm-wrap.open { display: flex; }

    /* ── Tabs (within a page) ────────────────────────── */
    .tab-bar { display: flex; gap: 4px; margin-bottom: 16px; }
    .tab-btn {
      background: none; border: 1px solid transparent;
      border-radius: 8px; color: var(--muted);
      padding: 6px 14px; font-size: 12px; font-weight: 600;
      cursor: pointer; font-family: inherit; transition: all .15s;
    }
    .tab-btn:hover { color: var(--text); border-color: var(--border); }
    .tab-btn.active { color: var(--accent); border-color: var(--accent-bdr); background: var(--accent-dim); }

    /* ── Events feed ─────────────────────────────────── */
    .event-row { display: flex; gap: 12px; padding: 10px 0; border-bottom: 1px solid var(--border); align-items: flex-start; }
    .event-row:last-child { border-bottom: none; }
    .event-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--muted); flex-shrink: 0; margin-top: 5px; }
    .event-dot.err  { background: var(--danger); }
    .event-dot.info { background: var(--blue); }
    .event-body { flex: 1; }
    .event-type { font-size: 12px; font-weight: 700; }
    .event-detail { font-size: 11px; color: var(--muted); word-break: break-all; }
    .event-ts { font-size: 10px; color: var(--subtle); white-space: nowrap; font-family: 'JetBrains Mono', monospace; }

    /* ── Exercise form section ───────────────────────── */
    .ex-form-wrap { max-width: 800px; }

    /* ── Responsive ──────────────────────────────────── */
    @media (max-width: 700px) {
      :root { --sidebar-w: 0px; }
      #sidebar { display: none; }
      #content { padding: 16px; }
    }
  </style>
</head>
<body>

<!-- ── Login page ─────────────────────────────────── -->
<div id="login-page">
  <div class="login-card">
    <div class="login-logo">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#10b981" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="11" width="18" height="11" rx="2"/>
        <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
      </svg>
    </div>
    <div class="login-title">JustFit Admin</div>
    <div class="login-sub">Owner portal — restricted access</div>
    <hr class="login-divider" />
    <label class="field-label" for="login-email">Email</label>
    <input id="login-email" class="field-input" type="email" placeholder="admin@justfit.cc" autocomplete="username" />
    <label class="field-label" for="login-password">Password</label>
    <input id="login-password" class="field-input" type="password" placeholder="••••••••••" autocomplete="current-password" />
    <button id="login-btn" class="btn-primary" type="button">Sign in</button>
    <div id="login-error" class="login-error"></div>
  </div>
</div>

<!-- ── Admin shell ─────────────────────────────────── -->
<div id="admin-shell">
  <div class="shell-layout">

    <!-- Sidebar -->
    <nav id="sidebar">
      <div class="sidebar-logo">
        <div class="sidebar-logo-mark">
          <div class="logo-tile">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#020617" stroke-width="2.5">
              <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/>
            </svg>
          </div>
          <div>
            <div class="logo-text">JustFit</div>
            <div class="logo-sub">Admin</div>
          </div>
        </div>
      </div>

      <button class="nav-item active" data-nav="overview">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
        Overview
      </button>
      <button class="nav-item" data-nav="users">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        Users
      </button>
      <button class="nav-item" data-nav="trainers">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M20 21a8 8 0 1 0-16 0"/><path d="m14.5 19.5 2 2.5 3-4"/></svg>
        Trainers
        <span id="pending-badge" class="nav-badge" style="display:none">0</span>
      </button>
      <button class="nav-item" data-nav="billing">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="4" width="22" height="16" rx="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg>
        Billing
      </button>
      <button class="nav-item" data-nav="exercises">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6.5 6.5h11M6.5 12h11M6.5 17.5h6"/><rect x="3" y="3" width="18" height="18" rx="2"/></svg>
        Exercises
      </button>
      <button class="nav-item" data-nav="team">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
        Team
      </button>

      <div class="sidebar-bottom">
        <div id="admin-name" class="admin-info"></div>
        <button id="logout-btn" class="btn-ghost">Sign out</button>
      </div>
    </nav>

    <!-- Main content -->
    <main id="content">
      <div class="loading">Loading…</div>
    </main>

  </div>
</div>

<!-- ── Modal ───────────────────────────────────────── -->
<div id="modal-overlay">
  <div class="modal" id="modal-box">
    <button class="modal-close" id="modal-close">×</button>
    <div id="modal-content"></div>
  </div>
</div>

<script src="/admin/app.js?v=1"></script>
</body>
</html>
