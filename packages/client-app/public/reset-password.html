<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JustFit.cc — Reset Password</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      background: #020617;
      color: #f8fafc;
      font-family: -apple-system, 'Helvetica Neue', Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .card {
      width: 100%;
      max-width: 420px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 28px;
      padding: 40px;
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 36px;
    }
    .logo-mark {
      width: 42px; height: 42px;
      background: #10b981;
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-weight: 900; font-size: 15px; color: #fff;
      box-shadow: 0 4px 20px rgba(16,185,129,0.3);
    }
    .logo-text { font-size: 20px; font-weight: 900; letter-spacing: -0.02em; }
    .logo-text span { color: #10b981; }
    h1 { font-size: 26px; font-weight: 900; letter-spacing: -0.02em; margin-bottom: 8px; }
    .subtitle { font-size: 14px; color: #64748b; margin-bottom: 32px; line-height: 1.6; }
    .field { margin-bottom: 16px; }
    label {
      display: block;
      font-size: 11px; font-weight: 800;
      letter-spacing: 0.1em; text-transform: uppercase;
      color: #64748b; margin-bottom: 8px;
    }
    input {
      width: 100%; padding: 14px 16px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 14px; color: #f8fafc;
      font-size: 15px; font-family: inherit;
      outline: none; transition: border-color 0.15s;
    }
    input:focus { border-color: rgba(16,185,129,0.5); }
    .btn {
      width: 100%; padding: 16px;
      background: #10b981; border: none;
      border-radius: 16px; color: #fff;
      font-size: 15px; font-weight: 900;
      cursor: pointer; margin-top: 8px;
      box-shadow: 0 8px 30px rgba(16,185,129,0.3);
      transition: opacity 0.15s;
    }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .alert {
      padding: 14px 16px;
      border-radius: 12px;
      font-size: 13px;
      margin-bottom: 20px;
      display: none;
    }
    .alert-error { background: rgba(226,76,74,0.1); border: 1px solid rgba(226,76,74,0.3); color: #f87171; }
    .alert-success { background: rgba(16,185,129,0.1); border: 1px solid rgba(16,185,129,0.3); color: #6ee7b7; }
    .back-link {
      display: block;
      text-align: center;
      font-size: 13px;
      color: #64748b;
      text-decoration: none;
      margin-top: 20px;
    }
    .back-link:hover { color: #10b981; }
    .invalid-token {
      text-align: center;
      padding: 20px 0;
    }
    .invalid-token .icon { font-size: 40px; margin-bottom: 16px; }
    .invalid-token h2 { font-size: 20px; font-weight: 800; margin-bottom: 8px; }
    .invalid-token p { font-size: 14px; color: #64748b; line-height: 1.6; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <div class="logo-mark">JF</div>
      <div class="logo-text">JustFit<span>.cc</span></div>
    </div>

    <div id="invalid-view" class="invalid-token" style="display:none;">
      <div class="icon">🔗</div>
      <h2>Link expired</h2>
      <p>This password reset link has expired or already been used.<br/>Request a new one from the login page.</p>
      <a href="/login.html" style="display:inline-block;margin-top:20px;background:#10b981;color:#fff;font-weight:900;font-size:14px;padding:12px 24px;border-radius:12px;text-decoration:none;">Back to Login</a>
    </div>

    <div id="reset-view">
      <h1>Set new password</h1>
      <p class="subtitle">Choose a strong password you haven't used before.</p>

      <div id="error" class="alert alert-error"></div>
      <div id="success" class="alert alert-success"></div>

      <div class="field">
        <label>New Password</label>
        <input type="password" id="password" placeholder="Min. 6 characters" autocomplete="new-password" />
      </div>
      <div class="field">
        <label>Confirm Password</label>
        <input type="password" id="confirm" placeholder="Repeat password" autocomplete="new-password" />
      </div>

      <button class="btn" id="submit-btn">
        Set New Password
      </button>

      <a href="/login.html" class="back-link">Back to login</a>
    </div>
  </div>

  <script src="/reset-password.js" defer></script>
</body>
</html>
