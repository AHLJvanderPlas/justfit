// ─── Push-up pose: hi-fi figurative illustration ─────────────────────────────
// Anatomical line drawing — black stroke on white (toggleable).
// 600×400 viewBox, side view, top of the push-up.
function PushUpPose({ phase = "top", invert = false, showGrid = false }) {
  const stroke = invert ? "#fff" : "#0a0a0a";
  const bg = invert ? "#0a0a0a" : "#ffffff";
  // Tween a few key joint positions between top and bottom of push-up.
  const t = phase === "top" ? 0 : phase === "bottom" ? 1 : 0.5;
  const lerp = (a,b) => a + (b - a) * t;

  // Anchor points (tuned by eye for a realistic side-view)
  const shoulder = { x: 200, y: lerp(170, 220) };
  const elbow    = { x: 200, y: lerp(265, 240) };
  const wrist    = { x: 200, y: 320 };
  const hip      = { x: 350, y: lerp(180, 230) };
  const knee     = { x: 470, y: lerp(220, 270) };
  const ankle    = { x: 540, y: 320 };
  const head     = { cx: 145, cy: lerp(165, 215), rx: 38, ry: 30, rot: -8 };
  const neck     = { x: 175, y: lerp(170, 220) };
  // Back curve control point — slight arch
  const backMid  = { x: 275, y: lerp(170, 220) };

  return (
    <svg viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg" style={{ width:"100%", height:"100%", display:"block", background: bg }}>
      {showGrid && (
        <g stroke="#e5e5e5" strokeWidth="0.5">
          {Array.from({length:13}).map((_,i)=> <line key={"v"+i} x1={i*50} y1="0" x2={i*50} y2="400"/>)}
          {Array.from({length:9}).map((_,i)=>  <line key={"h"+i} x1="0" y1={i*50} x2="600" y2={i*50}/>)}
        </g>
      )}
      {/* Floor */}
      <line x1="40" y1="320" x2="560" y2="320" stroke={stroke} strokeWidth="2" strokeLinecap="round"/>
      <g stroke={stroke} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" fill="none">
        {/* Head — oval, slight tilt */}
        <ellipse cx={head.cx} cy={head.cy} rx={head.rx} ry={head.ry} transform={`rotate(${head.rot} ${head.cx} ${head.cy})`}/>
        {/* Hair line cue */}
        <path d={`M ${head.cx-30} ${head.cy-22} Q ${head.cx-15} ${head.cy-32} ${head.cx+10} ${head.cy-26}`}/>
        {/* Ear */}
        <path d={`M ${head.cx+20} ${head.cy-2} q 4 2 0 8`}/>
        {/* Jaw → chin to neck */}
        <path d={`M ${head.cx+25} ${head.cy+18} Q ${head.cx+35} ${head.cy+22} ${neck.x} ${neck.y-6}`}/>
        {/* Neck-to-shoulder */}
        <path d={`M ${neck.x} ${neck.y-6} L ${shoulder.x} ${shoulder.y}`}/>
        {/* Back / torso top line — shoulder to hip with subtle curve */}
        <path d={`M ${shoulder.x} ${shoulder.y} Q ${backMid.x} ${backMid.y - 4} ${hip.x} ${hip.y}`}/>
        {/* Underside of torso — slight sag suggestion at bottom phase */}
        <path d={`M ${shoulder.x+15} ${shoulder.y+18} Q ${backMid.x} ${backMid.y + 22} ${hip.x-10} ${hip.y+18}`}/>
        {/* Arm: shoulder→elbow→wrist (wrist anchored to floor) */}
        <path d={`M ${shoulder.x} ${shoulder.y} L ${elbow.x} ${elbow.y} L ${wrist.x} ${wrist.y}`}/>
        {/* Triceps cue */}
        <path d={`M ${shoulder.x+8} ${shoulder.y+10} Q ${(shoulder.x+elbow.x)/2 + 6} ${(shoulder.y+elbow.y)/2} ${elbow.x+4} ${elbow.y-2}`}/>
        {/* Forearm */}
        <path d={`M ${elbow.x-6} ${elbow.y+4} L ${wrist.x-6} ${wrist.y-4}`}/>
        {/* Hand */}
        <path d={`M ${wrist.x-10} ${wrist.y} h 22`}/>
        {/* Glute / hip line */}
        <path d={`M ${hip.x-6} ${hip.y-4} Q ${hip.x+6} ${hip.y-12} ${hip.x+22} ${hip.y-6}`}/>
        {/* Leg: hip→knee→ankle */}
        <path d={`M ${hip.x} ${hip.y} L ${knee.x} ${knee.y} L ${ankle.x} ${ankle.y}`}/>
        {/* Quad cue */}
        <path d={`M ${hip.x+10} ${hip.y+12} Q ${(hip.x+knee.x)/2 + 4} ${(hip.y+knee.y)/2 + 8} ${knee.x-4} ${knee.y+2}`}/>
        {/* Calf cue */}
        <path d={`M ${knee.x+4} ${knee.y+8} Q ${(knee.x+ankle.x)/2 + 4} ${(knee.y+ankle.y)/2 + 6} ${ankle.x-2} ${ankle.y-4}`}/>
        {/* Foot — toes on floor */}
        <path d={`M ${ankle.x-8} ${ankle.y} L ${ankle.x+18} ${ankle.y}`}/>
        <path d={`M ${ankle.x-2} ${ankle.y-2} L ${ankle.x+18} ${ankle.y}`}/>
        {/* Shorts band */}
        <path d={`M ${hip.x-12} ${hip.y} q -2 16 12 18`}/>
        {/* T-shirt sleeve hint */}
        <path d={`M ${shoulder.x-10} ${shoulder.y-2} q 6 14 22 18`}/>
      </g>
    </svg>
  );
}

// ─── Animated push-up loop (toggle) ──────────────────────────────────────────
function PushUpLoop({ invert = false }) {
  const [t, setT] = useState(0);
  const [playing, setPlaying] = useState(true);
  useEffect(() => {
    if (!playing) return;
    let raf, last = performance.now();
    const tick = (now) => {
      const dt = (now - last) / 1000; last = now;
      setT(prev => (prev + dt / 2.4) % 1); // 2.4s loop
      raf = requestAnimationFrame(tick);
    };
    raf = requestAnimationFrame(tick);
    return () => cancelAnimationFrame(raf);
  }, [playing]);
  // Sinusoidal phase between top(0) and bottom(1)
  const phase = (Math.sin(t * Math.PI * 2 - Math.PI/2) + 1) / 2;
  const phaseLabel = phase < 0.33 ? "top" : phase > 0.66 ? "bottom" : "mid";
  // Re-use PushUpPose with explicit numeric phase
  return (
    <div style={{ position:"relative" }}>
      <svg viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg" style={{ width:"100%", height:"100%", display:"block", background: invert ? "#0a0a0a" : "#fff" }}>
        <PoseFigure t={phase} invert={invert} />
      </svg>
      <div style={{ position:"absolute", left:14, bottom:14, display:"flex", gap:8 }}>
        <button onClick={()=>setPlaying(p=>!p)} style={btnStyle(invert)}>{playing? "pause" : "play"}</button>
        <span style={{ ...badgeStyle(invert), textTransform:"uppercase" }}>{phaseLabel}</span>
      </div>
    </div>
  );
}

          />
        </DCArtboard>

        <DCArtboard id="new-2" label="Conditioning + cardio" width={1280} height={520}>
          <NewIconsBoard
            keys={["burpee","mtnclimber","jack","jumprope","sled","ropes","sandbag","getup","swim","box","agility"]}
            labels={{
              burpee:"Burpee",
              mtnclimber:"Mountain climber",
              jack:"Jumping jack",
              jumprope:"Jump rope",
              sled:"Sled push / drag",
              ropes:"Battle ropes",
              sandbag:"Sandbag",
              getup:"Turkish get-up",
              swim:"Swim",
              box:"Boxing / shadow-box",
              agility:"Agility / ladder",
            }}
          />
        </DCArtboard>

        <DCArtboard id="new-3" label="Recovery" width={1280} height={300}>
          <NewIconsBoard
            keys={["yoga"]}
            labels={{ yoga:"Yoga (downward-dog, etc.)" }}
          />
        </DCArtboard>
      </DCSection>

      {/* Section 4: pose illustration */}
      <DCSection id="pose" title="Pose illustration — push-up (CSS/SVG, no GIF)">
        <DCArtboard id="pose-1" label="Static — top of rep (white bg)" width={1280} height={520}>
          <PoseBoard variant="top" invert={false} />
        </DCArtboard>
        <DCArtboard id="pose-2" label="Static — bottom of rep (dark bg, white lines)" width={1280} height={520}>
          <PoseBoard variant="bottom" invert={true} />
        </DCArtboard>
        <DCArtboard id="pose-3" label="Animated loop (no GIF — pure SVG + RAF)" width={1280} height={520}>
          <LoopBoard invert={true} />
        </DCArtboard>
        <DCArtboard id="pose-4" label="Implementation notes" width={1280} height={760}>
          <ImplementationNotes />
        </DCArtboard>
      </DCSection>
    </DesignCanvas>
  );
}

// ─── Boards ─────────────────────────────────────────────────────────────────
function Overview({ counts }) {
  const tile = (label, value, color, sub) => (
    <div style={{ background:"#111", border:"1px solid var(--line)", borderRadius:8, padding:"24px 28px", flex:1 }}>
      <div style={{ font:"500 11px 'JetBrains Mono', monospace", color:"var(--dim)", letterSpacing:"0.1em", textTransform:"uppercase" }}>{label}</div>
      <div style={{ font:`800 64px/1 'Barlow Condensed', sans-serif`, color, marginTop:8 }}>{value}</div>
      {sub && <div style={{ font:"400 13px/1.4 'Inter Tight'", color:"var(--dim)", marginTop:10, maxWidth:240 }}>{sub}</div>}
    </div>
  );
  return (
    <div style={{ width:"100%", height:"100%", padding:32, display:"flex", flexDirection:"column", gap:24 }}>
      <div>
        <h1 style={{ font:"800 44px/1 'Barlow Condensed'", textTransform:"uppercase", letterSpacing:"0.01em" }}>What we have, what's missing</h1>
        <p style={{ color:"var(--dim)", maxWidth:780, marginTop:10, lineHeight:1.5 }}>
          The icon set in <span className="mono" style={{color:"var(--ink)"}}>src/icons.jsx</span> covers <strong>27 movement keys</strong> via the <span className="mono">EXERCISE_PATHS</span> map and <strong>26 substring rules</strong> in <span className="mono">iconKeyFor()</span> in App.jsx. Movements outside those rules fall through to the generic dumbbell <span className="mono">default</span>. Below: which buckets are solid, which are blurry, and which need new icons.
        </p>
      </div>
      <div style={{ display:"flex", gap:16 }}>
        {tile("Solid coverage", counts.good, "var(--good)", "Movement is mapped to a distinct, accurate icon.")}
        {tile("Weak / shared", counts.weak, "var(--warn)", "Mapped, but the icon is a poor match (e.g. side-plank → plank).")}
        {tile("Missing → default", counts.missing, "var(--miss)", "Falls through to the generic dumbbell icon.")}
        {tile("Sharing one slot", counts.distinctNeeded, "var(--accent)", "Five cardio movements all map to 'sprint'.")}
        {tile("Total gaps", counts.totalGaps, "#fff", "Distinct new icons + regroupings to add.")}
      </div>
    </div>
  );
}

function StatusDot({ status }) {
  const map = { good:"var(--good)", weak:"var(--warn)", missing:"var(--miss)", "missing-distinct":"var(--accent)" };
  return <span style={{ width:8, height:8, borderRadius:"50%", background:map[status], display:"inline-block" }} />;
}

function AuditGrid({ groups }) {
  return (
    <div style={{ width:"100%", padding:"24px 32px", display:"flex", flexDirection:"column", gap:20 }}>
      {Object.entries(groups).map(([g, rows]) => (
        <div key={g}>
          <div style={{ display:"flex", alignItems:"baseline", gap:14, paddingBottom:8, borderBottom:"1px solid var(--line)" }}>
            <h3 style={{ font:"700 22px 'Barlow Condensed'", textTransform:"uppercase", letterSpacing:"0.04em" }}>{g}</h3>
            <span className="mono" style={{ color:"var(--dim)", fontSize:11 }}>{rows.length} movement families</span>
          </div>
          <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fill, minmax(280px, 1fr))", gap:12, marginTop:14 }}>
            {rows.map((r,i)=>(
              <div key={i} style={{ background:"#111", border:"1px solid var(--line)", borderRadius:8, padding:14, display:"flex", gap:14, alignItems:"flex-start" }}>
                <div style={{ width:48, height:48, flexShrink:0, background:r.maps==="default"?"#1a1a1a":"transparent", border:"1px solid var(--line)", borderRadius:6, display:"flex", alignItems:"center", justifyContent:"center" }}>
                  <Ico k={r.maps} size={36} c={r.status==="good"?"#fff":"#9aa0a6"} />
                </div>
                <div style={{ flex:1, minWidth:0 }}>
                  <div style={{ display:"flex", alignItems:"center", gap:6, marginBottom:4 }}>
                    <StatusDot status={r.status} />
                    <span className="mono" style={{ fontSize:11, color:"var(--dim)", textTransform:"uppercase", letterSpacing:"0.06em" }}>
                      {r.status === "good" ? "ok" : r.status === "weak" ? "weak match" : r.status === "missing-distinct" ? "needs distinct" : "missing"}
                    </span>
                  </div>
                  <div style={{ font:"600 14px 'Inter Tight'", lineHeight:1.3, wordBreak:"break-word" }}>{r.slug}</div>
                  <div className="mono" style={{ fontSize:11, color:"var(--dim)", marginTop:4 }}>→ {r.maps}{r.suggest?` → suggest: ${r.suggest}`:""}</div>
                  {(r.note || r.why) && <div style={{ font:"400 12px/1.5 'Inter Tight'", color:"var(--dim)", marginTop:6 }}>{r.note || r.why}</div>}
                </div>
              </div>
            ))}
          </div>
        </div>
      ))}
    </div>
  );
}

function NewIconsBoard({ keys, labels }) {
  return (
    <div style={{ width:"100%", height:"100%", padding:"28px 32px" }}>
      <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fill, minmax(180px, 1fr))", gap:14 }}>
        {keys.map(k => (
          <div key={k} style={{ background:"#111", border:"1px solid var(--line)", borderRadius:8, padding:18, display:"flex", flexDirection:"column", alignItems:"center", gap:10 }}>
            <div style={{ width:80, height:80, display:"flex", alignItems:"center", justifyContent:"center" }}>
              <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="#fff" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round">
                {NEW_PATHS[k] || EX_PATHS.default}
              </svg>
            </div>
            <div className="mono" style={{ fontSize:11, color:"var(--accent)", letterSpacing:"0.06em" }}>{k}</div>
            <div style={{ font:"500 13px/1.3 'Inter Tight'", textAlign:"center", color:"var(--ink)" }}>{labels[k]}</div>
          </div>
        ))}
      </div>
    </div>
  );
}

function PoseBoard({ variant, invert }) {
  return (
    <div style={{ width:"100%", height:"100%", display:"grid", gridTemplateColumns:"1.6fr 1fr", gap:24, padding:24 }}>
      <div style={{ background: invert ? "#0a0a0a" : "#fff", border:"1px solid var(--line)", borderRadius:8, overflow:"hidden", display:"flex", alignItems:"center", justifyContent:"center" }}>
        <PushUpPose phase={variant} invert={invert} />
      </div>
      <div style={{ display:"flex", flexDirection:"column", gap:14, justifyContent:"center" }}>
        <div className="mono" style={{ fontSize:11, color:"var(--accent)", textTransform:"uppercase", letterSpacing:"0.1em" }}>{invert ? "Dark · white lines" : "Light · black lines"}</div>
        <h2 style={{ font:"800 36px/1 'Barlow Condensed'", textTransform:"uppercase" }}>Push-up — {variant === "top" ? "top of rep" : "bottom of rep"}</h2>
        <p style={{ color:"var(--dim)", lineHeight:1.5, maxWidth:380 }}>
          Side view, no background, single-stroke vector. Joints animate by lerping between two key poses (top: arms locked out · bottom: chest near floor). Renders identically on retina, mobile, print.
        </p>
        <ul style={{ listStyle:"none", padding:0, margin:0, display:"flex", flexDirection:"column", gap:6, color:"var(--ink)" }}>
          <li className="mono" style={{ fontSize:12 }}>— stroke 2.5px, round caps + joins</li>
          <li className="mono" style={{ fontSize:12 }}>— 600×400 viewBox · scales to any size</li>
          <li className="mono" style={{ fontSize:12 }}>— inherits currentColor → recolours per theme</li>
          <li className="mono" style={{ fontSize:12 }}>— file size: ~1.4 KB gzip vs ~80 KB for a small GIF</li>
        </ul>
      </div>
    </div>
  );
}

function LoopBoard({ invert }) {
  return (
    <div style={{ width:"100%", height:"100%", display:"grid", gridTemplateColumns:"1.6fr 1fr", gap:24, padding:24 }}>
      <div style={{ background: invert ? "#0a0a0a" : "#fff", border:"1px solid var(--line)", borderRadius:8, overflow:"hidden", display:"flex", alignItems:"center", justifyContent:"center" }}>
        <PushUpLoop invert={invert} />
      </div>
      <div style={{ display:"flex", flexDirection:"column", gap:14, justifyContent:"center" }}>
        <div className="mono" style={{ fontSize:11, color:"var(--accent)", textTransform:"uppercase", letterSpacing:"0.1em" }}>Animated · 2.4s loop · sin-wave easing</div>
        <h2 style={{ font:"800 36px/1 'Barlow Condensed'", textTransform:"uppercase" }}>Why not a GIF</h2>
        <ul style={{ listStyle:"none", padding:0, margin:0, display:"flex", flexDirection:"column", gap:8, color:"var(--ink)", lineHeight:1.5 }}>
          <li><strong>Crisp at any size.</strong> SVG vector — no pixelation on retina or 4K.</li>
          <li><strong>Theme-aware.</strong> Inherits text colour → switches with light/dark mode automatically.</li>
          <li><strong>Tiny.</strong> A push-up GIF: 30–80 KB. This: ~2 KB of inline SVG + a small RAF loop.</li>
          <li><strong>Pausable & accessible.</strong> Easy <span className="mono">prefers-reduced-motion</span> guard — pause and show static top-of-rep frame.</li>
          <li><strong>Editable.</strong> Tweak phase keyframes, timing, joint positions in code — no asset pipeline.</li>
          <li><strong>Same model = many movements.</strong> Re-use the joint rig for squat, lunge, deadlift, etc. by changing the keyframe poses.</li>
        </ul>
      </div>
    </div>
  );
}

function ImplementationNotes() {
  return (
    <div style={{ width:"100%", height:"100%", padding:"28px 36px", display:"flex", flexDirection:"column", gap:18 }}>
      <h2 style={{ font:"800 36px/1 'Barlow Condensed'", textTransform:"uppercase" }}>How to add this to the app</h2>
      <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:24 }}>
        <div>
          <h3 style={{ font:"700 18px 'Barlow Condensed'", textTransform:"uppercase", color:"var(--accent)" }}>1. Extend <span className="mono">EXERCISE_PATHS</span></h3>
          <p style={{ color:"var(--dim)", lineHeight:1.5, marginTop:8 }}>
            Add the 22 new keys to <span className="mono">src/icons.jsx</span>: clean, jerk, hinge, legpress, machine, hollow, legraise, burpee, mtnclimber, jack, jumprope, sled, ropes, sandbag, getup, swim, box, agility, yoga, sideplank, farmer, rowerg.
          </p>
        </div>
        <div>
          <h3 style={{ font:"700 18px 'Barlow Condensed'", textTransform:"uppercase", color:"var(--accent)" }}>2. Update <span className="mono">iconKeyFor()</span> in App.jsx</h3>
          <p style={{ color:"var(--dim)", lineHeight:1.5, marginTop:8 }}>
            <strong>Re-order rules</strong> so distinct movements (burpee, mountain-climber, jumping-jack, jump-rope) match before the catch-all <span className="mono">sprint</span> bucket. Add new substring rules for clean/jerk/hinge/etc.
          </p>
        </div>
        <div>
          <h3 style={{ font:"700 18px 'Barlow Condensed'", textTransform:"uppercase", color:"var(--accent)" }}>3. Pose illustrations — separate component</h3>
          <p style={{ color:"var(--dim)", lineHeight:1.5, marginTop:8 }}>
            Create <span className="mono">src/poses.jsx</span> with a <span className="mono">&lt;ExercisePose slug name phase animated /&gt;</span> component. One joint rig, many keyframe sets keyed by exercise slug. Used in the workout-detail view, NOT in the small list icons.
          </p>
        </div>
        <div>
          <h3 style={{ font:"700 18px 'Barlow Condensed'", textTransform:"uppercase", color:"var(--accent)" }}>4. Two tiers, not one</h3>
          <p style={{ color:"var(--dim)", lineHeight:1.5, marginTop:8 }}>
            Keep small <span className="mono">ExerciseIcon</span> (24×24, 1.5 stroke) for lists and dashboards. Use the new larger pose figure (600×400) only on the exercise instruction screen, where space + context warrants the detail.
          </p>
        </div>
      </div>
      <div style={{ background:"#111", border:"1px solid var(--line)", borderRadius:8, padding:16, marginTop:8 }}>
        <div className="mono" style={{ fontSize:11, color:"var(--accent)", letterSpacing:"0.1em", textTransform:"uppercase", marginBottom:8 }}>Rollout order</div>
        <div className="mono" style={{ fontSize:13, lineHeight:1.7, color:"var(--ink)" }}>
          1. Add 8 highest-ROI icons (burpee, mtnclimber, jack, sled, ropes, getup, hinge, hollow)<br/>
          2. Wire to iconKeyFor() — verify in app, no regressions<br/>
          3. Build PoseFigure rig; deliver push-up + squat as first two pose illustrations<br/>
          4. Then: deadlift, lunge, plank, pull-up, bench → 7 hi-fi poses cover ~80% of all session content
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
