<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>JustFit.cc — Consistency over Intensity</title>
    <meta name="description" content="A privacy-first fitness app that adapts to your real life. Daily check-in. Smart plan. Just show up." />

    <!-- Favicons -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/icons/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/icons/favicon-16x16.png" />

    <!-- iOS home-screen icon (must be before manifest) -->
    <link rel="apple-touch-icon" sizes="180x180" href="/icons/apple-touch-icon.png" />

    <!-- PWA manifest -->
    <link rel="manifest" href="/site.webmanifest" />

    <!-- Theme / status bar -->
    <meta name="theme-color" content="#020617" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="JustFit" />

    <!-- Windows tile -->
    <meta name="msapplication-TileColor" content="#020617" />
    <meta name="msapplication-TileImage" content="/icons/mstile-150x150.png" />
  </head>
